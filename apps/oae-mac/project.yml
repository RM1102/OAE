name: OAE
options:
  bundleIdPrefix: computer.oae
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "$(ARCHS_STANDARD)"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.4"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_PREVIEWS: YES

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    branch: main
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  OAE:
    type: application
    platform: macOS
    sources:
      - path: OAE
        excludes:
          - "Resources/Info.plist"
          - "Resources/OAE.entitlements"
    resources:
      - path: OAE/Resources/Assets.xcassets
    info:
      path: OAE/Resources/Info.plist
      properties:
        CFBundleName: OAE
        CFBundleDisplayName: OAE
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIconName: AppIcon
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: YES
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: "OAE needs microphone access to transcribe your voice locally on the Apple Neural Engine."
        NSAppleEventsUsageDescription: "OAE uses Apple Events only to paste text back to the frontmost app when you enable auto-paste."
    entitlements:
      path: OAE/Resources/OAE.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.network.client: true
        com.apple.security.cs.allow-jit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: computer.oae.OAE
        PRODUCT_NAME: OAE
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
